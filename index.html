<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خروجة الصحاب 😎</title>

<!-- Flatpickr CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<!-- ثيم ملائم وواضح للتقويم -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#6a11cb,#2575fc);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
width:90%;
max-width:450px;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
text-align:center;
}

h1{
margin-bottom:15px;
}

p{
margin-bottom:20px;
color:#555;
}

button, .btn-link{
display: inline-block;
padding:12px 24px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
margin:10px;
text-decoration: none;
text-align: center;
}

.yes{
background:#4CAF50;
color:white;
}

.no{
background:#ff5252;
color:white;
position:relative;
transition: transform 0.2s ease; /* حركة انزلاقية سلسة عند الهروب */
}

.hidden{
display:none;
}

#calendar{
margin-top:20px;
padding: 12px;
width: 100%;
border: 1px solid #ccc;
border-radius: 8px;
text-align: center;
font-size: 16px;
outline: none;
}

.submit{
background:#2575fc;
color:white;
width:100%;
margin-top:15px;
}

.success{
font-size:22px;
line-height:1.8;
}

/* زر المشاركة على الواتساب */
.share-btn {
background: #25D366;
color: white;
width: 100%;
margin-top: 15px;
font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

<!-- الصفحة الأولى -->
<div id="page1">
<h1>😎 خروجة الصحاب</h1>
<p>يا شباب تيجوا نخرج قريب؟</p>
<button class="yes" onclick="nextPage()">يلا بينا 😍</button>
<button class="no" id="noBtn">لسه مش متأكد 😅</button>
</div>

<!-- الصفحة الثانية -->
<div id="page2" class="hidden">
<h1>📅 إمتى تبقى فاضي؟</h1>
<p>اختار كل الأيام اللي تبقى فاضي فيها</p>
<input id="calendar" placeholder="اضغط لاختيار الأيام">
<button class="submit" onclick="finish()">إرسال ✅</button>
</div>

<!-- الصفحة الثالثة -->
<div id="page3" class="hidden">
    <div class="success">

        🔪 كويس إنك جاوبت

        <br><br>

        هنشوف أنسب معاد ونبلغك 😎

    </div>
</div>
</div>

<!-- مكتبة Flatpickr الأساسية -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<!-- ملف تعريب التقويم -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ar.js"></script>

<script>
let selectedDates=[];
let formattedDatesText = "";

flatpickr("#calendar",{
mode:"multiple",
dateFormat:"Y-m-d",
locale: "ar", // تفعيل اللغة العربية للتقويم
onChange:function(dates, dateStr){
selectedDates=dates;
formattedDatesText = dateStr; // تخزين النص المنسق للتواريخ
}
});

function nextPage(){
document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");
}

async function finish() {

    if (selectedDates.length === 0) {
        alert("اختار يوم واحد على الأقل");
        return;
    }

    const name = prompt("اكتب اسمك");

    if (!name) return;

    const dates = selectedDates.map(d =>
        d.toLocaleDateString("ar-EG")
    ).join(" , ");

    try {

        const response = await fetch("https://sheetdb.io/api/v1/vl497i29wid2s", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                data: [
                    {
                        name: name,
                        dates: dates
                    }
                ]
            })
        });

        const result = await response.json();
        console.log(result);

        document.getElementById("page2").classList.add("hidden");
        document.getElementById("page3").classList.remove("hidden");

    } catch (err) {
        console.error(err);
        alert("فشل إرسال البيانات");
    }
}
const noBtn=document.getElementById("noBtn");

// دالة تحريك الزر بنطاق متناسب لتجنب اختفائه خارج الشاشة
function moveButton() {
const x=Math.random()*160-80;
const y=Math.random()*160-80;
noBtn.style.transform=`translate(${x}px, ${y}px)`;
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);
</script>

</body>
</html>
